version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: bloodconnect-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bloodconnect
    ports:
      - "3307:3306"

  backend:
    build: ./backend
    container_name: bloodconnect-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bloodconnect
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  frontend:
    build: ./frontend
    container_name: bloodconnect-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend